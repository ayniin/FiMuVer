version: '3.8'

services:
  # PostgreSQL Datenbank
  postgres:
    image: postgres:16-alpine
    container_name: fimuver-db
    environment:
      POSTGRES_USER: fimuver_user
      POSTGRES_PASSWORD: fimuver_password
      POSTGRES_DB: fimuver_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fimuver_user -d fimuver_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fimuver-api
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=fimuver_user
      - DATABASE_PASSWORD=fimuver_password
      - DATABASE_NAME=fimuver_db
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: go run ./cmd/api/main.go

  # React Frontend (optional für Entwicklung)
  # Für Production: mit Nginx servieren
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "5173:5173"
  #   volumes:
  #     - ./frontend:/app
  #   command: npm run dev

  # pgAdmin für DB Management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fimuver-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fimuver.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local

