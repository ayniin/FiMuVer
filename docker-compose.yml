
services:
  # PostgreSQL Datenbank
  postgres:
    image: postgres:16-alpine
    container_name: fimuver-db
    environment:
      POSTGRES_USER: fimuver_user
      POSTGRES_PASSWORD: fimuver_password
      POSTGRES_DB: fimuver_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fimuver_user -d fimuver_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go Backend API
  backend:
    build:
      context: ./backend  # Kontext auf das Backend-Verzeichnis setzen
      dockerfile: Dockerfile
    container_name: fimuver-api
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=fimuver_user
      - DATABASE_PASSWORD=fimuver_password
      - DATABASE_NAME=fimuver_db
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    # Kein Volume-Mount für den Code im Production-Build, da er im Image ist
    # command wird durch CMD im Dockerfile definiert

  # React Frontend (optional für Entwicklung)
  # Für Production: mit Nginx servieren
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fimuver-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host

  # pgAdmin für DB Management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fimuver-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  frontend_node_modules:

